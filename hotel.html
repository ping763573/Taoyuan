<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沐石·湯宿 | 極致品味 - 頂級溫泉飯店</title>
    
    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream: #F5F0E8;
            --burgundy: #5D1916;
            --linen: #D9D2C5;
            --charcoal: #2D2D2D;
        }

        body {
            background-color: var(--cream);
            font-family: 'Noto Serif TC', serif;
            color: var(--charcoal);
            overflow-x: hidden;
            margin: 0;
        }

        h1, h2, h3, .serif-eng {
            font-family: 'Playfair Display', serif;
        }

        /* 噪點紋理 */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.1;
            pointer-events: none;
            z-index: 9999;
        }

        /* 圖片佔位與載入動畫 */
        .img-wrapper {
            background-color: #E5E1D8;
            position: relative;
            overflow: hidden;
        }

        .img-wrapper::after {
            content: "MU SHI";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Playfair Display', serif;
            letter-spacing: 0.5em;
            opacity: 0.2;
            font-size: 0.8rem;
        }

        .reveal-box {
            position: relative;
            clip-path: inset(0 100% 0 0);
            transition: clip-path 1.5s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .reveal-box.active {
            clip-path: inset(0 0 0 0);
        }

        /* 自定義游標 */
        .custom-cursor {
            width: 20px;
            height: 20px;
            background: var(--burgundy);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            mix-blend-mode: multiply;
            transform: translate(-50%, -50%);
            display: none;
        }

        @media (min-width: 768px) {
            .custom-cursor { display: block; }
            body { cursor: none; }
        }

        nav.scrolled {
            background: rgba(245, 240, 232, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(93, 25, 22, 0.1);
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="custom-cursor" id="cursor"></div>

    <!-- Navigation -->
    <nav id="navbar" class="fixed w-full z-50 px-8 py-6 flex justify-between items-center transition-all duration-500">
        <div class="text-2xl font-bold tracking-widest text-burgundy">沐石·湯宿</div>
        <div class="hidden md:flex space-x-12 text-sm tracking-widest text-burgundy opacity-70 uppercase">
            <a href="#about" class="hover:opacity-100 transition">隱世之居</a>
            <a href="#experience" class="hover:opacity-100 transition">感官體驗</a>
            <a href="#cta" class="hover:opacity-100 transition">立即預訂</a>
        </div>
        <button class="px-6 py-2 border border-burgundy text-burgundy text-xs tracking-[0.3em] hover:bg-burgundy hover:text-white transition duration-500">
            BOOKING
        </button>
    </nav>

    <!-- Hero -->
    <section class="relative h-screen flex items-center justify-center overflow-hidden bg-charcoal">
        <div class="absolute inset-0 z-0">
            <div class="absolute inset-0 bg-black/30 z-10"></div>
            <!-- 主視覺：奢華溫泉池 -->
            <img src="https://images.unsplash.com/photo-1544161515-4ab6ce6db874?auto=format&w=1600" 
                 alt="[頂級溫泉飯店主視覺]" 
                 class="w-full h-full object-cover" id="hero-img">
        </div>
        <div class="relative z-20 text-center text-white">
            <span class="block text-sm tracking-[0.8em] mb-6 opacity-0 translate-y-4" id="hero-tag">ORIENTAL RETREAT</span>
            <h1 class="text-6xl md:text-9xl mb-8 opacity-0 translate-y-8" id="hero-title">
                沐石 <span class="italic serif-eng text-4xl md:text-6xl">Zen</span> 湯宿
            </h1>
            <p class="text-lg md:text-xl tracking-[0.4em] font-light opacity-0 translate-y-4" id="hero-desc">
                尊榮至上 ｜ 極致品味 ｜ 絕對私密
            </p>
        </div>
    </section>

    <!-- Intro Section (修正禪意空間圖片) -->
    <section id="about" class="py-32 px-8 md:px-24 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
            <div class="order-2 md:order-1">
                <div class="reveal-box active img-wrapper aspect-[4/5] shadow-2xl">
                    <!-- 禪意空間圖片：使用多重備援機制 -->
                    <img id="intro-img" 
                         src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&w=1000" 
                         alt="[禪意空間圖片]" 
                         class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-1000"
                         onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1505672938882-17eaa7d8683b?auto=format&w=1000';">
                </div>
            </div>
            <div class="order-1 md:order-2 space-y-8">
                <h2 class="text-4xl md:text-5xl text-burgundy leading-tight">
                    大地的脈動，<br>在泉水中靜靜流淌。
                </h2>
                <p class="text-gray-600 leading-loose text-lg text-justify">
                    沐石·湯宿不僅是一處居所，更是一場關於感官的修行。我們將天然原石與當代建築語彙結合，
                    在繁華之外開闢一方淨土。讓溫熱的泉水洗去塵囂，讓木頭的香氣安撫心神。
                </p>
                <div class="pt-4">
                    <a href="#" class="inline-flex items-center space-x-4 group">
                        <span class="text-burgundy tracking-widest text-sm">探索空間細節</span>
                        <iconify-icon icon="ph:arrow-right-light" class="text-xl group-hover:translate-x-2 transition-transform text-burgundy"></iconify-icon>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <!-- Experience Section (修正其他圖片) -->
    <section id="experience" class="py-32 bg-[#E8E2D6]">
        <div class="px-8 md:px-24 mb-20 text-center md:text-left">
            <span class="text-burgundy tracking-[0.3em] text-xs uppercase block mb-4">Core Values</span>
            <h2 class="text-4xl md:text-5xl">極致品味的定義</h2>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 px-8 md:px-12">
            <!-- 絕對私密 -->
            <div class="group">
                <div class="reveal-box mb-8 aspect-[3/4] img-wrapper">
                    <img src="https://images.unsplash.com/photo-1615529182904-14819c35db37?auto=format&w=800" 
                         alt="[絕對私密客房圖片]" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110"
                         onerror="this.src='https://images.unsplash.com/photo-1590490359683-658d3d23f972?auto=format&w=800'">
                </div>
                <h3 class="text-2xl mb-4 text-burgundy font-bold">絕對私密</h3>
                <p class="text-gray-600 leading-relaxed font-light">獨立電梯直達專屬湯室，一站式隱形管家服務。</p>
            </div>

            <!-- 極致溫泉 -->
            <div class="group md:mt-24">
                <div class="reveal-box mb-8 aspect-[3/4] img-wrapper">
                    <img src="https://images.unsplash.com/photo-1540541338287-41700207dee6?auto=format&w=800" 
                         alt="[溫泉體驗圖片]" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                </div>
                <h3 class="text-2xl mb-4 text-burgundy font-bold">極致溫泉</h3>
                <p class="text-gray-600 leading-relaxed font-light">選用最深層的地熱泉水，富含礦物質。</p>
            </div>

            <!-- 匠心空間 -->
            <div class="group">
                <div class="reveal-box mb-8 aspect-[3/4] img-wrapper">
                    <img src="https://images.unsplash.com/photo-1618219908412-a29a1bb7b86e?auto=format&w=800" 
                         alt="[匠心空間設計圖片]" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                </div>
                <h3 class="text-2xl mb-4 text-burgundy font-bold">匠心空間</h3>
                <p class="text-gray-600 leading-relaxed font-light">融合原石紋理與深色橡木，打造藝廊般的體驗。</p>
            </div>
        </div>
    </section>

    <!-- Call to Action -->
    <section id="cta" class="py-48 relative overflow-hidden flex flex-col items-center justify-center text-center px-8 bg-charcoal">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1621293954908-907159247fc8?auto=format&w=1600" 
                 alt="[風景背景]" class="w-full h-full object-cover opacity-30 grayscale">
        </div>
        <div class="relative z-10 space-y-12">
            <h2 class="text-5xl md:text-8xl text-[#D9D2C5] italic serif-eng">The Silence Awaits</h2>
            <button class="bg-burgundy text-white px-16 py-6 rounded-full text-lg tracking-[0.3em] hover:bg-white hover:text-burgundy transition-all duration-500">
                立即預訂
            </button>
        </div>
    </section>

    <script>
        // Custom Cursor
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, {
                x: e.clientX,
                y: e.clientY,
                duration: 0.1,
                ease: "power1.out"
            });
        });

        // Navbar Scroll
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('scrolled', 'py-4');
            } else {
                nav.classList.remove('scrolled', 'py-4');
            }
        });

        // GSAP
        gsap.registerPlugin(ScrollTrigger);

        const tl = gsap.timeline();
        tl.to("#hero-tag", { opacity: 1, y: 0, duration: 1, delay: 0.3 })
          .to("#hero-title", { opacity: 1, y: 0, duration: 1 }, "-=0.6")
          .to("#hero-desc", { opacity: 1, y: 0, duration: 0.8 }, "-=0.6");

        document.querySelectorAll('.reveal-box').forEach(box => {
            ScrollTrigger.create({
                trigger: box,
                start: "top 90%",
                onEnter: () => box.classList.add('active')
            });
        });
    </script>
</body>
</html>
